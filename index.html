<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sabaoth Lode</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#111111">
    <link rel="apple-touch-icon" href="./icon.png">
    
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
</head>
<body class="bg-[#111111] text-[#ffffff] min-h-screen font-sans antialiased tracking-wide overflow-x-hidden">

    <div id="sidebar-overlay" class="fixed inset-0 bg-black/70 z-40 hidden transition-opacity" onclick="toggleSidebar()"></div>

    <aside id="sidebar" class="fixed top-0 left-0 w-4/5 max-w-sm h-full bg-[#1a1a1a] border-r border-white/[0.05] z-50 transform -translate-x-full transition-transform duration-300 ease-in-out shadow-[4px_0_15px_rgba(0,0,0,0.8)] flex flex-col">
        <div class="p-5 border-b border-white/[0.05] flex justify-between items-center">
            <h2 class="text-lg font-bold text-[#aaaaaa]">Archivio Eventi</h2>
            <button onclick="toggleSidebar()" class="text-[#888888] text-2xl font-bold p-2">&times;</button>
        </div>
        <div id="past-events-container" class="p-4 overflow-y-auto flex-1 space-y-4">
            </div>
    </aside>

    <header class="bg-[#111111] border-b border-white/[0.05] sticky top-0 z-30 shadow-[0_4px_10px_rgba(0,0,0,0.5)]">
        <div class="max-w-md mx-auto px-4 py-4 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <button onclick="toggleSidebar()" class="text-[#ffffff] p-1 focus:outline-none">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
                </button>
                <h1 class="text-xl font-bold tracking-wide text-[#ffffff] m-0">Sabaoth Lode</h1>
            </div>
            <span id="status-badge" class="bg-[#333333] text-[#aaaaaa] text-xs px-2.5 py-1 rounded-full font-medium border border-[#555555]">Caricamento...</span>
        </div>
    </header>

    <main class="max-w-md mx-auto p-4 pb-12">
        <div id="install-container" class="hidden mb-6 bg-white/[0.03] rounded-xl p-5 shadow-[0_4px_10px_rgba(0,0,0,0.5)] border border-white/[0.05] text-center">
            <h3 class="font-bold text-[#ffffff] mb-2 text-lg">Installa l'App</h3>
            <p class="text-[#aaaaaa] text-sm mb-4 font-light">Accedi più velocemente al calendario direttamente dalla Home.</p>
            <button id="install-btn" class="bg-[#333333] text-[#ffffff] font-bold py-3 px-6 rounded-xl w-full border-none cursor-pointer hover:brightness-110 flex items-center justify-center gap-2">
                📲 Installa Ora
            </button>
            <p id="ios-instruction" class="hidden text-[11px] text-[#888888] mt-3">
                🍎 Hai un iPhone? Tocca <strong>Condividi</strong> e seleziona <strong>"Aggiungi a schermata Home"</strong>.
            </p>
        </div>

        <div>
            <h2 class="text-sm font-bold text-[#888888] uppercase tracking-widest mb-4 pl-1">Prossimi Appuntamenti</h2>
            <div id="upcoming-events-container" class="space-y-5"></div>
        </div>
    </main>

    <script>
        // 1. IL TUO LINK CSV
        const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRJvRESTof_RVpmAyb5vkGX7mAweXbXESyE3BaaX81f4YS3PCo_4c395DvcP7q-iBwr59diu4DLzzCt/pub?gid=1040693821&single=true&output=csv';

        // 2. GESTIONE SIDEBAR
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');
            sidebar.classList.toggle('-translate-x-full');
            overlay.classList.toggle('hidden');
        }

        // 3. SERVICE WORKER E INSTALLAZIONE
        if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js');

        let deferredPrompt;
        const installContainer = document.getElementById('install-container');
        const installBtn = document.getElementById('install-btn');
        const iosInstruction = document.getElementById('ios-instruction');
        const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;

        if (isIOS) {
            installContainer.classList.remove('hidden');
            installBtn.classList.add('hidden');
            iosInstruction.classList.remove('hidden');
        } else {
            window.addEventListener('beforeinstallprompt', (e) => {
                e.preventDefault(); deferredPrompt = e; installContainer.classList.remove('hidden');
            });
            installBtn.addEventListener('click', async () => {
                if (deferredPrompt) {
                    deferredPrompt.prompt();
                    const { outcome } = await deferredPrompt.userChoice;
                    if (outcome === 'accepted') installContainer.classList.add('hidden');
                    deferredPrompt = null;
                }
            });
        }

        // 4. FORMATTAZIONI
        function formatDate(dateString) {
            if (!dateString || !dateString.includes('-')) return dateString;
            const parts = dateString.split('-');
            const months = ['Gen', 'Feb', 'Mar', 'Apr', 'Mag', 'Giu', 'Lug', 'Ago', 'Set', 'Ott', 'Nov', 'Dic'];
            return `${parts[2]} ${months[parseInt(parts[1], 10) - 1]}`;
        }

        // Genera il link per Google Calendar
        function getCalendarLink(dateStr, timeStr, title) {
            if(!dateStr || !dateStr.includes('-')) return '#';
            const dateStrClean = dateStr.replace(/-/g, '');
            let timeStrClean = "090000"; // Default
            if(timeStr && timeStr.includes(':')) {
                const parts = timeStr.split(':');
                timeStrClean = parts[0] + parts[1] + "00";
            }
            return `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent(title)}&dates=${dateStrClean}T${timeStrClean}Z/${dateStrClean}T${timeStrClean}Z&details=Calendario+Lode`;
        }

        // 5. RECUPERO DATI (Con Cache per Offline)
        async function fetchCalendarData() {
            const badge = document.getElementById('status-badge');
            
            // Prova a caricare subito i dati salvati (Offline mode veloce)
            const cachedData = localStorage.getItem('lodeAppData');
            if(cachedData) processEvents(JSON.parse(cachedData));

            try {
                const response = await fetch(SHEET_CSV_URL);
                const csvText = await response.text();
                Papa.parse(csvText, {
                    header: true, skipEmptyLines: true,
                    complete: function(results) { 
                        localStorage.setItem('lodeAppData', JSON.stringify(results.data)); // Salva per l'offline
                        processEvents(results.data); 
                        badge.innerText = "Aggiornato";
                        badge.className = "bg-white/[0.03] text-[#aaaaaa] text-xs px-2.5 py-1 rounded-full font-light border border-white/[0.05]";
                    }
                });
            } catch (error) {
                if(!cachedData) badge.innerText = "Sei Offline";
            }
        }

        // 6. SUDDIVISIONE: PROSSIMI EVENTI VS STORICO
        function processEvents(events) {
            const upcomingContainer = document.getElementById('upcoming-events-container');
            const pastContainer = document.getElementById('past-events-container');
            
            const today = new Date();
            today.setHours(0,0,0,0); // Azzera l'ora per confrontare solo la data

            let upcoming = [];
            let past = [];

            events.forEach(event => {
                if (!event.Data || !event['Tipo Evento']) return;
                const evDate = new Date(event.Data);
                
                if (evDate >= today) upcoming.push(event);
                else past.push(event);
            });

            // Ordina futuri dal più vicino, passati dal più recente
            upcoming.sort((a, b) => new Date(a.Data) - new Date(b.Data));
            past.sort((a, b) => new Date(b.Data) - new Date(a.Data));

            // Prendi solo i primi 4 appuntamenti futuri
            const nextEvents = upcoming.slice(0, 4);

            renderCards(nextEvents, upcomingContainer, "Nessun evento in programma.");
            renderCards(past, pastContainer, "Nessun evento passato.", true);
        }

        // 7. DISEGNO DELLE SCHEDE (HTML)
        function renderCards(events, container, emptyMessage, isPast = false) {
            let htmlContent = '';
            events.forEach(event => {
                let formationBlock = event.Formazione ? `<div class="border-t border-b border-[#333333] py-3"><p class="text-[11px] text-[#888888] uppercase font-bold tracking-wider mb-1">Formazione</p><p class="text-sm text-[#aaaaaa] font-light">${event.Formazione}</p></div>` : '';
                
                let songsBlock = '';
                if (event['Scaletta Canzoni']) {
                    const separator = event['Scaletta Canzoni'].includes('|') ? '|' : ',';
                    const songs = event['Scaletta Canzoni'].split(separator).filter(s => s.trim() !== '');
                    songsBlock = `<div><p class="text-[11px] text-[#888888] uppercase font-bold tracking-wider mb-2">Scaletta</p><ul class="space-y-2 text-sm">${songs.map((s, i) => `<li class="bg-white/[0.03] px-3 py-2.5 rounded-xl border border-white/[0.05] flex gap-2"><span class="text-[#aaaaaa] font-bold">${i + 1}.</span> <span class="text-[#ffffff]">${s.trim()}</span></li>`).join('')}</ul></div>`;
                }

                let notesBlock = event['Note e Prove'] ? `<div class="bg-white/[0.03] border border-white/[0.05] rounded-xl p-3 text-[13px] text-[#aaaaaa] mt-3 font-light tracking-wide">📌 ${event['Note e Prove']}</div>` : '';

                // Bottone Aggiungi al Calendario (Solo per i futuri)
                let calendarBtn = !isPast ? `
                    <a href="${getCalendarLink(event.Data, event.Orario, event['Tipo Evento'])}" target="_blank" class="mt-4 flex items-center justify-center gap-2 w-full bg-white/[0.05] hover:bg-white/[0.1] text-[#aaaaaa] text-xs py-2.5 rounded-lg border border-white/[0.05] transition-colors decoration-none">
                        📅 Salva nel Calendario
                    </a>` : '';

                // Le schede passate sono leggermente più sbiadite (opacità)
                const opacityClass = isPast ? 'opacity-70 grayscale-[30%]' : '';

                htmlContent += `<div class="bg-white/[0.03] rounded-2xl p-5 shadow-[0_4px_10px_rgba(0,0,0,0.5)] border border-white/[0.05] space-y-4 ${opacityClass}">
                    <div class="flex justify-between items-start gap-4">
                        <div>
                            <span class="bg-[#333333] text-[#ffffff] border border-[#555555] text-[10px] font-bold px-2.5 py-0.5 rounded-full uppercase tracking-wider">${event['Tipo Evento']}</span>
                            <h2 class="text-[22px] font-bold mt-2.5 text-[#ffffff] m-0 leading-tight">${formatDate(event.Data)}</h2>
                        </div>
                        <div class="text-right shrink-0"><span class="bg-[#333333] px-2.5 py-1.5 rounded-lg text-sm font-bold text-[#ffffff] block border border-[#555555] shadow-sm">${event.Orario || '--:--'}</span></div>
                    </div>
                    ${formationBlock}${songsBlock}${notesBlock}${calendarBtn}
                </div>`;
            });
            container.innerHTML = htmlContent || `<p class="text-center text-[#888888] font-light py-8">${emptyMessage}</p>`;
        }

        fetchCalendarData();
    </script>
</body>
</html>
