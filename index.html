<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Calendario Gruppo Lode</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#111111">
    <link rel="apple-touch-icon" href="./icon.png">
    
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in-up {
            opacity: 0;
            animation: fadeInUp 0.5s ease-out forwards;
        }
        .stagger-1 { animation-delay: 0.1s; }
        .stagger-2 { animation-delay: 0.2s; }
        .stagger-3 { animation-delay: 0.3s; }

        /* Smooth Accordion */
        .accordion-grid {
            display: grid;
            grid-template-rows: 0fr;
            transition: grid-template-rows 0.3s ease-in-out, opacity 0.3s ease-in-out, margin 0.3s ease-in-out;
            opacity: 0;
            margin-top: 0;
        }
        .accordion-grid.expanded {
            grid-template-rows: 1fr;
            opacity: 1;
            margin-top: 1rem;
        }
        .accordion-content {
            overflow: hidden;
        }
    </style>
</head>
<body class="bg-[#111111] text-[#ffffff] min-h-screen font-sans antialiased tracking-wide overflow-x-hidden">

    <div id="sidebar-overlay" class="fixed inset-0 bg-black/70 z-40 hidden transition-opacity" onclick="toggleSidebar()"></div>
    <aside id="sidebar" class="fixed top-0 left-0 w-4/5 max-w-sm h-full bg-[#1a1a1a] border-r border-white/[0.05] z-50 transform -translate-x-full transition-transform duration-300 ease-in-out shadow-[4px_0_15px_rgba(0,0,0,0.8)] flex flex-col">
        <div class="p-5 border-b border-white/[0.05] flex justify-between items-center">
            <h2 class="text-lg font-bold text-[#aaaaaa]">Menu</h2>
            <button onclick="toggleSidebar()" class="text-[#888888] text-2xl font-bold p-2">&times;</button>
        </div>
        <div class="p-4 border-b border-white/[0.05] space-y-2">
            <button onclick="switchView('calendario', true)" id="nav-calendario" class="w-full text-left bg-white/[0.05] text-white p-3 rounded-xl font-bold flex items-center gap-3 transition-colors">
                <svg class="w-5 h-5 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                Calendario
            </button>
            <button onclick="switchView('mansioni', true)" id="nav-mansioni" class="w-full text-left bg-transparent hover:bg-white/[0.05] text-[#cccccc] p-3 rounded-xl font-bold flex items-center gap-3 transition-colors">
                <svg class="w-5 h-5 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
                Mansioni
            </button>
            <button onclick="switchView('canzoni', true)" id="nav-canzoni" class="w-full text-left bg-transparent hover:bg-white/[0.05] text-[#cccccc] p-3 rounded-xl font-bold flex items-center gap-3 transition-colors">
                <svg class="w-5 h-5 text-fuchsia-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19V6l12-3v13M9 19c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zm12-3c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zM9 10l12-3"></path></svg>
                Archivio Canzoni
            </button>
        </div>
        <div class="p-4 border-b border-white/[0.05] flex items-center justify-between">
            <h3 class="text-sm font-bold text-[#888888] uppercase tracking-widest">Archivio Eventi</h3>
        </div>
        <div class="p-4 border-b border-white/[0.05]">
            <div class="relative w-full">
                <span class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-[#666666]">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                </span>
                <input type="text" id="search-input" placeholder="Cerca canzone o data..." class="w-full bg-[#222222] border border-[#444444] text-[#ffffff] text-sm rounded-lg focus:ring-[#666666] focus:border-[#666666] block pl-9 p-2.5 transition-colors placeholder-[#888888] outline-none">
            </div>
        </div>
        <div id="past-events-container" class="p-4 overflow-y-auto flex-1 space-y-4"></div>
    </aside>

    <header class="bg-[#111111]/80 backdrop-blur-lg border-b border-white/[0.05] sticky top-0 z-30 shadow-[0_4px_10px_rgba(0,0,0,0.5)]">
        <div class="max-w-md mx-auto px-4 py-4 flex justify-between items-center gap-2">
            <div class="flex items-center gap-2 flex-1 min-w-0">
                <button onclick="toggleSidebar()" class="text-[#ffffff] p-1 focus:outline-none cursor-pointer shrink-0">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
                </button>
                <div class="flex items-center gap-1 flex-1 min-w-0">
                    <h1 class="text-base sm:text-lg font-bold tracking-wide text-[#ffffff] m-0 truncate">Calendario Gruppo Lode</h1>
                    <button onclick="location.reload(true)" class="bg-white/[0.08] text-white border border-white/[0.15] hover:bg-white/[0.15] p-1.5 rounded-lg cursor-pointer transition-all shadow-sm shrink-0 active:scale-95 ml-1 flex items-center justify-center" title="Aggiorna App">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                    </button>
                </div>
            </div>
            <span id="status-badge" class="bg-[#333333] text-[#aaaaaa] text-xs px-2.5 py-1 rounded-full font-medium border border-[#555555] shrink-0">Caricamento...</span>
        </div>
        <div id="bacheca-container" class="hidden max-w-md mx-auto px-4 pb-4"></div>
    </header>

    <main id="view-calendario" class="max-w-md mx-auto p-4 pb-12">
        <div id="install-container" class="hidden mb-6 bg-white/[0.03] rounded-xl p-5 shadow-[0_4px_10px_rgba(0,0,0,0.5)] border border-white/[0.05] text-center">
            <h3 class="font-bold text-[#ffffff] mb-2 text-lg">Installa l'App</h3>
            <p class="text-[#aaaaaa] text-sm mb-4 font-light">Accedi più velocemente al calendario direttamente dalla Home.</p>
            <button id="install-btn" class="bg-[#333333] text-[#ffffff] font-bold py-3 px-6 rounded-xl w-full border-none cursor-pointer hover:brightness-110 flex items-center justify-center gap-2">
                📲 Installa Ora
            </button>
            <p id="ios-instruction" class="hidden text-[11px] text-[#888888] mt-3">
                🍎 Hai un iPhone? Tocca <strong>Condividi</strong> e seleziona <strong>"Aggiungi a schermata Home"</strong>.
            </p>
        </div>

        <div>
            <h2 class="text-lg font-black text-white uppercase tracking-widest mb-6 pl-1 drop-shadow-md">Prossimi Appuntamenti</h2>
            <div id="upcoming-events-container" class="space-y-5">
                <!-- Skeleton Loader -->
                <div class="animate-pulse flex flex-col gap-4">
                    <div class="bg-white/[0.03] p-6 rounded-2xl border border-white/[0.05] h-40">
                        <div class="h-6 bg-[#333333] rounded w-1/3 mb-4"></div>
                        <div class="h-8 bg-[#333333] rounded w-1/2 mb-4"></div>
                        <div class="h-4 bg-[#333333] rounded w-1/4"></div>
                    </div>
                    <div class="bg-white/[0.03] p-5 rounded-2xl border border-white/[0.05] h-32">
                        <div class="h-5 bg-[#333333] rounded w-1/3 mb-3"></div>
                        <div class="h-6 bg-[#333333] rounded w-1/2 mb-3"></div>
                        <div class="h-4 bg-[#333333] rounded w-1/4"></div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <main id="view-mansioni" class="hidden max-w-md mx-auto p-4 pb-12">
        <h2 class="text-lg font-black text-white uppercase tracking-widest mb-4 pl-1 drop-shadow-md">Mansioni Gruppo</h2>
        <div class="mb-6">
            <div class="relative w-full">
                <span class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-[#666666]">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                </span>
                <input type="text" id="search-mansioni" placeholder="Cerca persona..." class="w-full bg-[#222222] border border-[#444444] text-[#ffffff] text-sm rounded-lg focus:ring-[#666666] focus:border-[#666666] block pl-9 p-2.5 transition-colors placeholder-[#888888] outline-none">
            </div>
        </div>
        <div id="mansioni-container" class="space-y-4">
            <!-- Loader -->
            <div class="animate-pulse flex flex-col gap-3">
                <div class="bg-white/[0.03] p-5 rounded-2xl border border-white/[0.05] h-24"></div>
                <div class="bg-white/[0.03] p-5 rounded-2xl border border-white/[0.05] h-24"></div>
            </div>
        </div>
    </main>

    <main id="view-canzoni" class="hidden max-w-md mx-auto p-4 pb-12">
        <h2 class="text-lg font-black text-white uppercase tracking-widest mb-4 pl-1 drop-shadow-md">Archivio Canzoni</h2>
        <div class="mb-6">
            <div class="relative w-full">
                <span class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-[#666666]">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                </span>
                <input type="text" id="search-canzoni" placeholder="Cerca titolo o tonalità..." class="w-full bg-[#222222] border border-[#444444] text-[#ffffff] text-sm rounded-lg focus:ring-[#666666] focus:border-[#666666] block pl-9 p-2.5 transition-colors placeholder-[#888888] outline-none">
            </div>
        </div>
        <div id="canzoni-container" class="space-y-4">
            <!-- Loader -->
            <div class="animate-pulse flex flex-col gap-3">
                <div class="bg-white/[0.03] p-5 rounded-2xl border border-white/[0.05] h-32"></div>
                <div class="bg-white/[0.03] p-5 rounded-2xl border border-white/[0.05] h-32"></div>
            </div>
        </div>
    </main>

    <script>
        const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRJvRESTof_RVpmAyb5vkGX7mAweXbXESyE3BaaX81f4YS3PCo_4c395DvcP7q-iBwr59diu4DLzzCt/pub?gid=1040693821&single=true&output=csv';
        const MANSIONI_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRJvRESTof_RVpmAyb5vkGX7mAweXbXESyE3BaaX81f4YS3PCo_4c395DvcP7q-iBwr59diu4DLzzCt/pub?gid=532902345&single=true&output=csv';
        const CANZONI_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRJvRESTof_RVpmAyb5vkGX7mAweXbXESyE3BaaX81f4YS3PCo_4c395DvcP7q-iBwr59diu4DLzzCt/pub?gid=157082409&single=true&output=csv';

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('-translate-x-full');
            document.getElementById('sidebar-overlay').classList.toggle('hidden');
        }

        if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js');

        let deferredPrompt;
        const installContainer = document.getElementById('install-container');
        const installBtn = document.getElementById('install-btn');
        const iosInstruction = document.getElementById('ios-instruction');
        const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
        const isStandalone = window.navigator.standalone || window.matchMedia('(display-mode: standalone)').matches;

        if (isStandalone) {
            // L'app è già installata, nascondi il banner a prescindere dal sistema
            installContainer.classList.add('hidden');
        } else if (isIOS) {
            installContainer.classList.remove('hidden');
            installBtn.classList.add('hidden');
            iosInstruction.classList.remove('hidden');
        } else {
            window.addEventListener('beforeinstallprompt', (e) => {
                e.preventDefault(); deferredPrompt = e; installContainer.classList.remove('hidden');
            });
            installBtn.addEventListener('click', async () => {
                if (deferredPrompt) {
                    deferredPrompt.prompt();
                    const { outcome } = await deferredPrompt.userChoice;
                    if (outcome === 'accepted') installContainer.classList.add('hidden');
                    deferredPrompt = null;
                }
            });
        }

        function formatDate(dateString) {
            if (!dateString || !dateString.includes('-')) return dateString;
            const dateObj = new Date(dateString);
            const days = ['Domenica', 'Lunedì', 'Martedì', 'Mercoledì', 'Giovedì', 'Venerdì', 'Sabato'];
            const dayName = days[dateObj.getDay()];
            const parts = dateString.split('-');
            // Restituisce "Sabato 27" invece di "27 Giu"
            return `${dayName} ${parts[2]}`;
        }

        function getMonthName(dateString) {
            if (!dateString || !dateString.includes('-')) return '';
            const parts = dateString.split('-');
            const months = ['GENNAIO', 'FEBBRAIO', 'MARZO', 'APRILE', 'MAGGIO', 'GIUGNO', 'LUGLIO', 'AGOSTO', 'SETTEMBRE', 'OTTOBRE', 'NOVEMBRE', 'DICEMBRE'];
            return `${months[parseInt(parts[1], 10) - 1]} ${parts[0]}`;
        }

        function getEventColorTheme(eventType) {
            const type = (eventType || '').toLowerCase();
            if (type.includes('culto')) return 'bg-blue-500/20 text-blue-300 border-blue-500/30';
            if (type.includes('evento')) return 'bg-red-600/20 text-red-400 border-red-600/30';
            if (type.includes('prove') || type.includes('prova')) return 'bg-amber-500/20 text-amber-300 border-amber-500/30';
            if (type.includes('studio')) return 'bg-emerald-500/20 text-emerald-300 border-emerald-500/30';
            // Default grigio scuro
            return 'bg-[#333333] text-[#ffffff] border-[#666666]';
        }

        // GENERATORE ICS (Risolve i bug del fuso orario e di Google Calendar)
        window.downloadICS = function(titleEnc, dateStr, timeStr) {
            const title = decodeURIComponent(titleEnc);
            if(!dateStr || !dateStr.includes('-')) return;
            const dStr = dateStr.replace(/-/g, '');
            let tStart = "090000";
            let tEnd = "110000"; // Calcola in automatico 2 ore di durata per la lode
            
            if(timeStr && timeStr.includes(':')) {
                const parts = timeStr.split(':');
                tStart = parts[0] + parts[1] + "00";
                let endHour = (parseInt(parts[0], 10) + 2).toString().padStart(2, '0');
                tEnd = endHour + parts[1] + "00";
            }
            
            const icsContent = `BEGIN:VCALENDAR\nVERSION:2.0\nPRODID:-//Sabaoth Lode App//IT\nBEGIN:VEVENT\nSUMMARY:${title}\nDTSTART;TZID=Europe/Rome:${dStr}T${tStart}\nDTEND;TZID=Europe/Rome:${dStr}T${tEnd}\nDESCRIPTION:Promemoria salvato da Sabaoth Lode App\nEND:VEVENT\nEND:VCALENDAR`;

            const blob = new Blob([icsContent], { type: 'text/calendar;charset=utf-8' });
            const url = window.URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.setAttribute('download', 'evento_lode.ics');
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        };

        let allMansioni = [];
        let allCanzoni = [];

        function switchView(viewName, fromNav = false) {
            sessionStorage.setItem('lodeAppCurrentView', viewName);
            
            const calView = document.getElementById('view-calendario');
            const manView = document.getElementById('view-mansioni');
            const canView = document.getElementById('view-canzoni');
            
            const navCal = document.getElementById('nav-calendario');
            const navMan = document.getElementById('nav-mansioni');
            const navCan = document.getElementById('nav-canzoni');
            
            const titleElement = document.querySelector('header h1');

            // Reset all
            calView.classList.add('hidden');
            manView.classList.add('hidden');
            canView.classList.add('hidden');
            
            navCal.className = "w-full text-left bg-transparent hover:bg-white/[0.05] text-[#cccccc] p-3 rounded-xl font-bold flex items-center gap-3 transition-colors";
            navMan.className = "w-full text-left bg-transparent hover:bg-white/[0.05] text-[#cccccc] p-3 rounded-xl font-bold flex items-center gap-3 transition-colors";
            navCan.className = "w-full text-left bg-transparent hover:bg-white/[0.05] text-[#cccccc] p-3 rounded-xl font-bold flex items-center gap-3 transition-colors";

            if (viewName === 'calendario') {
                calView.classList.remove('hidden');
                navCal.className = "w-full text-left bg-white/[0.05] text-white p-3 rounded-xl font-bold flex items-center gap-3 transition-colors";
                titleElement.innerText = "Calendario Gruppo Lode";
            } else if (viewName === 'mansioni') {
                manView.classList.remove('hidden');
                navMan.className = "w-full text-left bg-white/[0.05] text-white p-3 rounded-xl font-bold flex items-center gap-3 transition-colors";
                titleElement.innerText = "Mansioni Gruppo";
                if (allMansioni.length === 0) fetchMansioniData();
            } else if (viewName === 'canzoni') {
                canView.classList.remove('hidden');
                navCan.className = "w-full text-left bg-white/[0.05] text-white p-3 rounded-xl font-bold flex items-center gap-3 transition-colors";
                titleElement.innerText = "Archivio Canzoni";
            }
            if (fromNav) {
                toggleSidebar();
            }
        }

        async function fetchMansioniData() {
            const cachedData = localStorage.getItem('lodeAppMansioni');
            if(cachedData) {
                allMansioni = JSON.parse(cachedData);
                renderMansioni(allMansioni);
            }

            try {
                const response = await fetch(MANSIONI_CSV_URL + '&t=' + new Date().getTime());
                const csvText = await response.text();
                Papa.parse(csvText, {
                    header: true, skipEmptyLines: true,
                    complete: function(results) { 
                        const newDataStr = JSON.stringify(results.data);
                        if (newDataStr !== cachedData) {
                            localStorage.setItem('lodeAppMansioni', newDataStr);
                            allMansioni = results.data;
                            renderMansioni(allMansioni); 
                        }
                    }
                });
            } catch (error) {
                console.error("Errore fetch mansioni", error);
                const container = document.getElementById('mansioni-container');
                if (container) container.innerHTML = '<div class="text-red-400 text-center p-6 bg-red-500/10 rounded-xl border border-red-500/30">Errore di connessione a Google Sheets. Impossibile scaricare le mansioni. Riprova più tardi.</div>';
            }
        }

        function getMemberColorClasses(nome) {
            const n = (nome || '').toLowerCase();
            if (n.includes('adrian')) return { bg: 'bg-red-500/20', text: 'text-red-400', border: 'border-red-500/30' };
            if (n.includes('daniele')) return { bg: 'bg-blue-500/20', text: 'text-blue-400', border: 'border-blue-500/30' };
            if (n.includes('gianni')) return { bg: 'bg-emerald-500/20', text: 'text-emerald-400', border: 'border-emerald-500/30' };
            if (n.includes('giona')) return { bg: 'bg-amber-500/20', text: 'text-amber-400', border: 'border-amber-500/30' };
            if (n.includes('rebecca t')) return { bg: 'bg-violet-500/20', text: 'text-violet-400', border: 'border-violet-500/30' };
            if (n.includes('rebecca g')) return { bg: 'bg-pink-500/20', text: 'text-pink-400', border: 'border-pink-500/30' };
            if (n.includes('gabriele')) return { bg: 'bg-cyan-500/20', text: 'text-cyan-400', border: 'border-cyan-500/30' };
            if (n.includes('pietro')) return { bg: 'bg-orange-500/20', text: 'text-orange-400', border: 'border-orange-500/30' };
            return { bg: 'bg-zinc-500/20', text: 'text-zinc-400', border: 'border-zinc-500/30' };
        }

        function renderMansioni(mansioni) {
            const container = document.getElementById('mansioni-container');
            if (!mansioni || mansioni.length === 0) {
                container.innerHTML = '<div class="text-[#888888] text-center p-6">Nessuna persona trovata.</div>';
                return;
            }

            let htmlContent = '';
            mansioni.forEach((m, index) => {
                if (!m.Nome) return;
                
                const c = getMemberColorClasses(m.Nome);
                const tasks = m.Mansioni ? m.Mansioni.split(',').map(t => `<li class="flex items-start gap-2 text-sm text-[#e0e0e0] mb-2"><svg class="w-4 h-4 ${c.text} mt-0.5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg> <span>${t.trim()}</span></li>`).join('') : '';
                const staggerClass = index < 5 ? `stagger-${index + 1}` : '';
                
                htmlContent += `
                    <div class="bg-white/[0.03] p-5 rounded-2xl border border-white/[0.05] shadow-[0_4px_10px_rgba(0,0,0,0.5)] animate-fade-in-up ${staggerClass} mb-4 cursor-pointer hover:bg-white/[0.04] transition-colors" onclick="toggleMansione(${index})">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 rounded-full ${c.bg} flex items-center justify-center ${c.text} font-bold text-lg border ${c.border} shrink-0">
                                ${m.Nome.charAt(0).toUpperCase()}
                            </div>
                            <div class="flex-1">
                                <h3 class="text-white font-bold text-lg m-0 leading-tight">${m.Nome}</h3>
                                <p class="${c.text} text-xs font-semibold uppercase tracking-widest mt-0.5">${m.Ruolo || 'Membro'}</p>
                            </div>
                            <div class="text-[#888888] shrink-0">

        async function fetchCanzoniData() {
            const cachedData = localStorage.getItem('lodeAppCanzoni');
            if(cachedData) {
                allCanzoni = JSON.parse(cachedData);
                renderCanzoni(allCanzoni);
                if (allEvents.length > 0) processEvents(allEvents);
            }

            try {
                const response = await fetch(CANZONI_CSV_URL + '&t=' + new Date().getTime());
                const csvText = await response.text();
                Papa.parse(csvText, {
                    header: true, skipEmptyLines: true,
                    complete: function(results) { 
                        const newDataStr = JSON.stringify(results.data);
                        if (newDataStr !== cachedData) {
                            localStorage.setItem('lodeAppCanzoni', newDataStr);
                            allCanzoni = results.data;
                            renderCanzoni(allCanzoni); 
                            if (allEvents.length > 0) processEvents(allEvents);
                        }
                    }
                });
            } catch (error) {
                console.error("Errore fetch canzoni", error);
                const container = document.getElementById('canzoni-container');
                if (container) container.innerHTML = '<div class="text-red-400 text-center p-6 bg-red-500/10 rounded-xl border border-red-500/30">Errore di connessione a Google Sheets. Impossibile scaricare le canzoni. Riprova più tardi.</div>';
            }
        }

        function renderCanzoni(canzoni) {
            const container = document.getElementById('canzoni-container');
            if (!canzoni || canzoni.length === 0) {
                container.innerHTML = '<div class="text-[#888888] text-center p-6">Nessuna canzone trovata.</div>';
                return;
            }

            let htmlContent = '';
            canzoni.forEach((c, index) => {
                if (!c.Titolo) return;
                
                const makeBtn = (url, label, color, icon) => {
                    if (!url) return '';
                    const urls = url.split('|');
                    return urls.map((u, i) => {
                        const lbl = urls.length > 1 ? `${label} ${i+1}` : label;
                        const safeUrl = u.trim().replace(/'/g, "\\'");
                        const safeTitle = c.Titolo.replace(/'/g, "\\'");
                        return `<button onclick="openPdfModal('${safeUrl}', '${safeTitle} - ${lbl}')" class="flex items-center gap-2 bg-${color}-500/10 hover:bg-${color}-500/20 text-${color}-400 border border-${color}-500/30 px-3 py-2 rounded-xl text-xs font-bold transition-colors">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">${icon}</svg>
                            ${lbl}
                        </button>`;
                    }).join('');
                };

                const btnAccordi = makeBtn(c['Link Accordi'], 'Accordi', 'emerald', '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19V6l12-3v13M9 19c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zm12-3c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zM9 10l12-3"></path>');
                const btnTesto = makeBtn(c['Link Testo'], 'Testo', 'blue', '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>');
                const btnTutorial = makeBtn(c['Link Tutorial'], 'Tutorial', 'fuchsia', '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"></path>');
                const btnAudio = makeBtn(c['Link Audio'], 'Audio', 'amber', '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>');

                const staggerClass = index < 10 ? `stagger-${(index % 5) + 1}` : '';
                
                htmlContent += `
                    <div class="bg-white/[0.03] p-4 rounded-2xl border border-white/[0.05] shadow-[0_4px_10px_rgba(0,0,0,0.5)] animate-fade-in-up ${staggerClass}">
                        <div class="flex justify-between items-start mb-3">
                            <h3 class="text-white font-bold text-lg m-0 leading-tight flex-1">${c.Titolo}</h3>
                            ${c['Tonalità'] ? `<span class="bg-white/10 text-[#dddddd] text-xs font-bold px-2 py-1 rounded-md shrink-0 ml-2 whitespace-nowrap">${c['Tonalità']}</span>` : ''}
                        </div>
                        <div class="flex flex-wrap gap-2 mt-3 pt-3 border-t border-white/[0.05]">
                            ${btnAccordi}${btnTesto}${btnTutorial}${btnAudio}
                            ${(!btnAccordi && !btnTesto && !btnTutorial && !btnAudio) ? '<span class="text-xs text-[#666666]">Nessun file disponibile</span>' : ''}

                    </div>

        }

        document.addEventListener('DOMContentLoaded', () => {
            const searchMansioni = document.getElementById('search-mansioni');
            if(searchMansioni) {
                searchMansioni.addEventListener('input', function(e) {
                    const query = e.target.value.toLowerCase();
                    const filtered = allMansioni.filter(m => m.Nome && m.Nome.toLowerCase().includes(query));
                    renderMansioni(filtered);
                });
            }
            const searchCanzoni = document.getElementById('search-canzoni');
            if(searchCanzoni) {
                searchCanzoni.addEventListener('input', function(e) {
                    const query = e.target.value.toLowerCase();
                    const filtered = allCanzoni.filter(c => 
                        (c.Titolo && c.Titolo.toLowerCase().includes(query)) ||
                        (c['Tonalità'] && c['Tonalità'].toLowerCase().includes(query))
                    );
                    renderCanzoni(filtered);
                });
            }
        });

        let allEvents = []; // Variabile globale per la ricerca

        function getSongLinks(songName) {
            if (!allCanzoni || allCanzoni.length === 0) return null;
            const normalizedName = songName.toLowerCase().replace(/\(.*?\)/g, '').trim();
            for (let c of allCanzoni) {
                if (!c.Titolo) continue;
                const normalizedTitolo = c.Titolo.toLowerCase().replace(/\(.*?\)/g, '').trim();
                if (normalizedName === normalizedTitolo || normalizedName.includes(normalizedTitolo)) {
                    return c;
                }
            }
            return null;
        }

        function resolveSongPdfUrl(songString, songData) {
            if (!songData || !songData['Link Accordi']) return null;
            const urls = songData['Link Accordi'].split('|');
            let targetUrl = urls[0].trim();
            
            const keyMatch = songString.match(/\((.*?)\)/);
            if (keyMatch && songData.Tonalità) {
                const requestedKey = keyMatch[1].replace(/\s+/g, '').toLowerCase();
                const availableKeys = songData.Tonalità.split(/[\/|\-,]/).map(k => k.replace(/\s+/g, '').toLowerCase());
                const keyIndex = availableKeys.indexOf(requestedKey);
                if (keyIndex !== -1 && urls[keyIndex]) {
                    targetUrl = urls[keyIndex].trim();
                }
            }
            return targetUrl;
        }

        document.getElementById('search-input').addEventListener('input', function(e) {
            const query = e.target.value.toLowerCase();
            processEvents(allEvents, false, query); 
        });

        async function fetchCalendarData() {
            const badge = document.getElementById('status-badge');
            const cachedData = localStorage.getItem('lodeAppData');
            if(cachedData) {
                allEvents = JSON.parse(cachedData);
                processEvents(allEvents);
            }

            try {
                const response = await fetch(SHEET_CSV_URL + '&t=' + new Date().getTime());
                const csvText = await response.text();
                Papa.parse(csvText, {
                    header: true, skipEmptyLines: true,
                    complete: function(results) { 
                        const newDataStr = JSON.stringify(results.data);
                        // Ridisegniamo la UI solo se i dati dal server sono effettivamente cambiati
                        // Questo previene il flash e la doppia animazione quando si apre l'app
                        if (newDataStr !== cachedData) {
                            localStorage.setItem('lodeAppData', newDataStr);
                            allEvents = results.data;
                            processEvents(allEvents); 
                        }
                        badge.innerText = "Aggiornato";
                        badge.className = "bg-white/[0.03] text-[#aaaaaa] text-xs px-2.5 py-1 rounded-full font-light border border-white/[0.05] shrink-0";
                    }
                });
            } catch (error) {
                if(!cachedData) {
                    badge.innerText = "Sei Offline";
                } else {
                    badge.innerText = "Offline (Dati salvati)";
                    badge.className = "bg-white/[0.03] text-[#aaaaaa] text-xs px-2.5 py-1 rounded-full font-light border border-white/[0.05] shrink-0";
                }
            }
        }

        function processEvents(events, updateBacheca = true, query = '') {
            const upcomingContainer = document.getElementById('upcoming-events-container');
            const pastContainer = document.getElementById('past-events-container');
            const bachecaContainer = document.getElementById('bacheca-container');
            
            const today = new Date();
            today.setHours(0,0,0,0);
            let upcoming = [];
            let past = [];

            // GESTIONE BACHECA
            if (updateBacheca) {
                const rowWithBacheca = events.find(e => e.Bacheca && e.Bacheca.trim() !== '');
                if (rowWithBacheca) {
                    bachecaContainer.innerHTML = `
                        <div class="bg-gradient-to-r from-[#2a2a2a] to-[#1f1f1f] border-l-4 border-[#ffaa00] p-4 rounded-xl shadow-[0_4px_10px_rgba(0,0,0,0.5)] flex items-start gap-3 animate-fade-in-up">
                            <span class="text-xl">📢</span>
                            <div class="text-[#e0e0e0] text-sm font-medium leading-snug mt-0.5">${rowWithBacheca.Bacheca.trim()}</div>
                        </div>`;
                    bachecaContainer.classList.remove('hidden');
                } else {
                    bachecaContainer.classList.add('hidden');
                }
            }

            events.forEach(event => {
                if (!event.Data || !event['Tipo Evento']) return;
                const evDate = new Date(event.Data);
                if (evDate >= today) {
                    upcoming.push(event);
                } else {
                    if (query) {
                        const textToSearch = (event['Titolo Calendario'] || '') + ' ' + 
                                             (event['Tipo Evento'] || '') + ' ' + 
                                             (event['Scaletta Canzoni'] || '') + ' ' + 
                                             (event.Data || '');
                        if (textToSearch.toLowerCase().includes(query)) {
                            past.push(event);
                        }
                    } else {
                        past.push(event);
                    }
                }
            });

            upcoming.sort((a, b) => new Date(a.Data) - new Date(b.Data));
            past.sort((a, b) => new Date(b.Data) - new Date(a.Data));

            renderUpcoming(upcoming, upcomingContainer);
            renderPast(past, pastContainer);
        }

        function renderUpcoming(events, container) {
            if(events.length === 0) {
                container.innerHTML = `<p class="text-center text-[#888888] font-light py-8">Nessun evento in programma.</p>`;
                return;
            }

            let htmlContent = '';
            let currentMonth = '';

            events.forEach((event, index) => {
                const monthStr = getMonthName(event.Data);
                const isHero = index === 0;

                // Creazione del Divisore Mensile
                if (monthStr !== currentMonth) {
                    htmlContent += `
                    <div class="${index === 0 ? 'mb-6' : 'mt-12 mb-6'} flex items-center gap-3">
                        <div class="bg-[#333333] p-2 rounded-lg border border-[#555555] shadow-md">
                            <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                        </div>
                        <h3 class="text-white text-xl font-black tracking-widest uppercase drop-shadow-md">${monthStr}</h3>
                        <div class="flex-1 h-px bg-gradient-to-r from-white/[0.1] to-transparent ml-2"></div>
                    </div>`;
                    currentMonth = monthStr;
                }

                let formationBlock = '';
                if (event.Formazione) {
                    const members = event.Formazione.split(',').map(m => m.trim()).filter(m => m !== '');
                    const chips = members.map(m => `<span class="bg-white/[0.05] text-[#cccccc] text-xs font-medium px-2.5 py-1 rounded-md border border-white/[0.05] shadow-sm">${m}</span>`).join('');
                    formationBlock = `<div class="border-t border-b border-[#333333] py-3 mt-4"><p class="text-[11px] text-[#888888] uppercase font-bold tracking-wider mb-2">Formazione</p><div class="flex flex-wrap gap-2">${chips}</div></div>`;
                }
                
                    let eventPlaylist = [];
                    let encodedPlaylist = '';
                    if (event['Scaletta Canzoni']) {

                        const songs = event['Scaletta Canzoni'].split(separator).filter(s => s.trim() !== '');
                        
                        // Costruisci playlist
                        songs.forEach(s => {
                            const songString = s.trim();
                            const songData = getSongLinks(songString);
                            const targetUrl = resolveSongPdfUrl(songString, songData);
                            if (targetUrl) {
                                const url = targetUrl.replace(/'/g, "\\'");
                                const title = (songData.Titolo || songString).replace(/'/g, "\\'");
                                eventPlaylist.push({ url: url, title: title + ' - Accordi' });

                        if (eventPlaylist.length > 0) encodedPlaylist = encodeURIComponent(JSON.stringify(eventPlaylist)).replace(/'/g, "\\'");
                        
                        let pdfIndexCounter = 0;

                            const songClean = s.trim();
                            const ytLink = `https://www.youtube.com/results?search_query=${encodeURIComponent(songClean)}`;
                            const songData = getSongLinks(songClean);
                            
                            let fileButtons = '';
                            if (songData && songData['Link Accordi']) {
                                const myPdfIndex = pdfIndexCounter++;
                                fileButtons = `<button onclick="openPdfModal('${encodedPlaylist}', ${myPdfIndex})" class="text-emerald-400 bg-emerald-500/10 p-2 rounded-lg border border-emerald-500/20 hover:bg-emerald-500/20 transition-colors flex items-center justify-center shrink-0" title="Apri Accordi">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19V6l12-3v13M9 19c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zm12-3c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zM9 10l12-3"></path></svg>
                                </button>`;
                            }

                            let displayTitle = songClean;
                            let keyChip = '';
                            const keyMatch = songClean.match(/\((.*?)\)/);
                            if (keyMatch) {

                            return `
                        <li class="bg-white/[0.03] px-3 py-2.5 rounded-xl border border-white/[0.05] flex justify-between items-center gap-2">
                            <div class="flex gap-2 items-center min-w-0">
                                <span class="text-[#aaaaaa] font-bold shrink-0">${i + 1}.</span>

                                ${keyChip}

                                    <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.5 12 3.5 12 3.5s-7.505 0-9.377.55a3.016 3.016 0 0 0-2.122 2.136C.005 8.08.005 12 .005 12s0 3.92.496 5.814a3.016 3.016 0 0 0 2.122 2.136c1.872.55 9.377.55 9.377.55s7.505 0 9.377-.55a3.016 3.016 0 0 0 2.122-2.136C24 15.92 24 12 24 12s0-3.92-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>

                            if (songData && songData['Link Accordi']) {
                                const myPdfIndex = pdfIndexCounter++;
                                fileButtons = `<button onclick="openPdfModal('${encodedPlaylist}', ${myPdfIndex})" class="text-emerald-400 p-1.5 rounded hover:bg-emerald-500/20 transition-colors flex items-center justify-center shrink-0" title="Apri Accordi">
                                    <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19V6l12-3v13M9 19c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zm12-3c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zM9 10l12-3"></path></svg>
                                </button>`;
                            }

                            let displayTitle = songClean;
                            let keyChip = '';
                            const keyMatch = songClean.match(/\((.*?)\)/);
                            if (keyMatch) {
                                const keyStr = keyMatch[1].trim();
                                displayTitle = songClean.replace(/\(.*?\)/g, '').trim();
                                keyChip = `<span class="bg-[#222222] text-[#cccccc] border border-[#444444] px-1.5 py-0.5 rounded text-[10px] font-bold shrink-0">${keyStr}</span>`;
                            }

                            return `<li class="flex justify-between items-center bg-white/[0.02] px-2 py-1.5 rounded-lg border border-white/[0.02] gap-2">
                                <span class="min-w-0 truncate"><span class="text-[#888888]">${i + 1}.</span> ${displayTitle}</span>
                                <div class="flex gap-1 shrink-0 items-center">
                                    ${keyChip}
                                    ${fileButtons}
                                    <a href="${ytLink}" target="_blank" class="text-[#ff4444] p-1.5 rounded hover:bg-[#ff4444]/20 transition-colors flex items-center justify-center shrink-0" title="Cerca su YouTube">
                                        <svg class="w-3 h-3" fill="currentColor" viewBox="0 0 24 24"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.5 12 3.5 12 3.5s-7.505 0-9.377.55a3.016 3.016 0 0 0-2.122 2.136C.005 8.08.005 12 .005 12s0 3.92.496 5.814a3.016 3.016 0 0 0 2.122 2.136c1.872.55 9.377.55 9.377.55s7.505 0 9.377-.55a3.016 3.016 0 0 0 2.122-2.136C24 15.92 24 12 24 12s0-3.92-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>
                                    </a>
                                </div>
                            </li>`;
                        }).join('')}</ul></div>`;
                    }
                }

                const caretIcon = hasSongs ? `
                    <button class="text-[#888888] focus:outline-none p-1 transition-transform duration-300" id="past-caret-${index}">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                    </button>
                ` : '';

                // rimosso grayscale-[50%] per miglior leggibilità
                htmlContent += `
                <div class="bg-white/[0.02] rounded-xl p-4 border border-white/[0.05] opacity-80 mb-3 animate-fade-in-up ${staggerClass} ${hasSongs ? 'cursor-pointer hover:bg-white/[0.04] transition-colors' : ''}" ${hasSongs ? `onclick="togglePastEvent(${index})"` : ''}>
                    <div class="flex justify-between items-center">
                        <div>
                            <span class="text-[#aaaaaa] text-[11px] font-bold uppercase tracking-wider">${calendarTitle}</span>
                            <h2 class="text-lg font-bold text-[#e0e0e0] m-0 mt-1">${formatDate(event.Data)}</h2>
                        </div>
                        <div class="flex flex-col items-end gap-1">
                            <span class="text-xs font-bold text-[#888888] bg-[#222222] px-2 py-1 rounded-md border border-[#333333]">${event.Orario || '--:--'}</span>
                            ${caretIcon}
                        </div>
                    </div>
                    <div id="past-songs-${index}" class="accordion-grid">
                        <div class="accordion-content">
                            ${songsBlock}
                        </div>
                    </div>
                </div>`;
            });
            container.innerHTML = htmlContent || `<p class="text-center text-[#888888] font-light py-4 text-sm">Nessun evento passato.</p>`;
        }

        function togglePastEvent(id) {
            const songsDiv = document.getElementById(`past-songs-${id}`);
            const caret = document.getElementById(`past-caret-${id}`);
            if(songsDiv && caret) {
                if(songsDiv.classList.contains('expanded')) {
                    songsDiv.classList.remove('expanded');
                    caret.classList.remove('rotate-180');
                } else {
                    songsDiv.classList.add('expanded');
                    caret.classList.add('rotate-180');
                }
            }
        }

        function toggleMansione(id) {
            const tasksDiv = document.getElementById(`mansione-tasks-${id}`);
            const caret = document.getElementById(`mansione-caret-${id}`);
            if(tasksDiv && caret) {
                if(tasksDiv.classList.contains('expanded')) {
                    tasksDiv.classList.remove('expanded');
                    tasksDiv.classList.remove('border-t');
                    caret.classList.remove('rotate-180');
                } else {
                    tasksDiv.classList.add('expanded');
                    tasksDiv.classList.add('border-t');
                    caret.classList.add('rotate-180');
                }
            }
        }

        let currentPlaylist = [];
        let currentPdfIndex = 0;

        function openPdfModal(playlistDataStr, index) {
            try {
                let decodedStr = playlistDataStr;
                if (playlistDataStr.startsWith('%5B')) {
                    decodedStr = decodeURIComponent(playlistDataStr);
                }

                if (decodedStr.startsWith('[')) {
                    currentPlaylist = JSON.parse(decodedStr);
                    currentPdfIndex = index;
                } else {
                    // Backward compatibility (e.g. from Canzoni list)
                    currentPlaylist = [{url: playlistDataStr, title: index}]; 
                    currentPdfIndex = 0;
                }
            } catch (e) {
                console.error("Error parsing playlist", e);
                return;
            }
            
            const modal = document.getElementById('pdf-modal');
            document.body.style.overflow = 'hidden';
            
            const viewport = document.querySelector('meta[name="viewport"]');
            if (viewport) viewport.setAttribute("content", "width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes");
            
            renderCurrentPdf();
            modal.classList.remove('hidden');
        }

        function renderCurrentPdf() {
            if (!currentPlaylist[currentPdfIndex]) return;
            const song = currentPlaylist[currentPdfIndex];
            const iframe = document.getElementById('pdf-iframe');
            document.getElementById('pdf-modal-title').innerText = song.title;
            iframe.src = song.url;
            
            const footer = document.getElementById('pdf-modal-footer');
            if (currentPlaylist.length > 1) {
                footer.classList.remove('hidden');
                footer.classList.add('flex');
                
                const prevBtn = document.getElementById('pdf-prev-btn');
                const nextBtn = document.getElementById('pdf-next-btn');
                const dots = document.getElementById('pdf-dots');
                
                if (currentPdfIndex > 0) prevBtn.classList.remove('opacity-30', 'pointer-events-none');
                else prevBtn.classList.add('opacity-30', 'pointer-events-none');
                
                if (currentPdfIndex < currentPlaylist.length - 1) nextBtn.classList.remove('opacity-30', 'pointer-events-none');
                else nextBtn.classList.add('opacity-30', 'pointer-events-none');
                
                dots.innerHTML = currentPlaylist.map((_, i) => `<div class="w-2 h-2 rounded-full transition-colors ${i === currentPdfIndex ? 'bg-[#e53e3e]' : 'bg-[#555555]'}"></div>`).join('');
            } else {
                footer.classList.add('hidden');
                footer.classList.remove('flex');
            }
        }

        function nextPdf() {
            if (currentPdfIndex < currentPlaylist.length - 1) {
                currentPdfIndex++;
                renderCurrentPdf();
            }
        }

        function prevPdf() {
            if (currentPdfIndex > 0) {
                currentPdfIndex--;
                renderCurrentPdf();
            }
        }

        function closePdfModal() {
            const modal = document.getElementById('pdf-modal');
            const iframe = document.getElementById('pdf-iframe');
            document.body.style.overflow = '';
            
            const viewport = document.querySelector('meta[name="viewport"]');
            if (viewport) viewport.setAttribute("content", "width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no");
            
            modal.classList.add('hidden');
            iframe.src = '';
        }
        
        let touchstartX = 0;
        let touchendX = 0;
        function handlePdfSwipe() {
            if (currentPlaylist.length <= 1) return;
            if (touchendX < touchstartX - 50) nextPdf();
            if (touchendX > touchstartX + 50) prevPdf();
        }
        document.addEventListener('DOMContentLoaded', () => {
            const header = document.getElementById('pdf-modal-header');
            const footer = document.getElementById('pdf-modal-footer');
            [header, footer].forEach(el => {
                if(!el) return;
                el.addEventListener('touchstart', e => { touchstartX = e.changedTouches[0].screenX; }, {passive: true});
                el.addEventListener('touchend', e => { touchendX = e.changedTouches[0].screenX; handlePdfSwipe(); }, {passive: true});
            });
        });

        fetchCalendarData();
        fetchCanzoniData();
        
        // Restore view from session storage if exists
        const savedView = sessionStorage.getItem('lodeAppCurrentView');
        if (savedView && savedView !== 'calendario') {
            switchView(savedView);
        }
    </script>

    <!-- Modal per i PDF -->
    <div id="pdf-modal" class="fixed inset-0 z-[100] hidden bg-black flex flex-col">
        <div id="pdf-modal-header" class="flex items-center justify-between bg-[#111111] p-4 border-b border-[#333333] touch-pan-y">
            <h3 id="pdf-modal-title" class="text-white font-bold text-lg truncate flex-1 pr-4 select-none">Testo</h3>
            <button onclick="closePdfModal()" class="text-gray-400 p-2 rounded-full hover:bg-white/10 shrink-0 border border-gray-600">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>
        </div>
        <div class="flex-1 w-full bg-[#111111] overflow-hidden relative">
            <iframe id="pdf-iframe" class="w-full h-full border-0 bg-white" src="" allow="autoplay"></iframe>
        </div>
        <div id="pdf-modal-footer" class="hidden items-center justify-between bg-[#111111] p-3 border-t border-[#333333] touch-pan-y">
            <button id="pdf-prev-btn" onclick="prevPdf()" class="bg-[#222222] text-white px-4 py-2 rounded-lg font-bold flex gap-2 items-center active:bg-[#333333]">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
            </button>
            <div id="pdf-dots" class="flex gap-2"></div>
            <button id="pdf-next-btn" onclick="nextPdf()" class="bg-[#e53e3e] text-white px-4 py-2 rounded-lg font-bold flex gap-2 items-center active:bg-[#c53030]">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
            </button>
        </div>
    </div>
</body>
</html>
