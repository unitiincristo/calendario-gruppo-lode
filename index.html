<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Calendario Gruppo Lode</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#111111">
    <link rel="apple-touch-icon" href="./icon.png">
    
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in-up {
            opacity: 0;
            animation: fadeInUp 0.5s ease-out forwards;
        }
        .stagger-1 { animation-delay: 0.1s; }
        .stagger-2 { animation-delay: 0.2s; }
        .stagger-3 { animation-delay: 0.3s; }
    </style>
</head>
<body class="bg-[#111111] text-[#ffffff] min-h-screen font-sans antialiased tracking-wide overflow-x-hidden">

    <div id="sidebar-overlay" class="fixed inset-0 bg-black/70 z-40 hidden transition-opacity" onclick="toggleSidebar()"></div>
    <aside id="sidebar" class="fixed top-0 left-0 w-4/5 max-w-sm h-full bg-[#1a1a1a] border-r border-white/[0.05] z-50 transform -translate-x-full transition-transform duration-300 ease-in-out shadow-[4px_0_15px_rgba(0,0,0,0.8)] flex flex-col">
        <div class="p-5 border-b border-white/[0.05] flex justify-between items-center">
            <h2 class="text-lg font-bold text-[#aaaaaa]">Archivio Eventi</h2>
            <button onclick="toggleSidebar()" class="text-[#888888] text-2xl font-bold p-2">&times;</button>
        </div>
        <div class="p-4 border-b border-white/[0.05]">
            <div class="relative w-full">
                <span class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-[#666666]">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                </span>
                <input type="text" id="search-input" placeholder="Cerca canzone o data..." class="w-full bg-[#222222] border border-[#444444] text-[#ffffff] text-sm rounded-lg focus:ring-[#666666] focus:border-[#666666] block pl-9 p-2.5 transition-colors placeholder-[#888888] outline-none">
            </div>
        </div>
        <div id="past-events-container" class="p-4 overflow-y-auto flex-1 space-y-4"></div>
    </aside>

    <header class="bg-[#111111] border-b border-white/[0.05] sticky top-0 z-30 shadow-[0_4px_10px_rgba(0,0,0,0.5)]">
        <div class="max-w-md mx-auto px-4 py-4 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <button onclick="toggleSidebar()" class="text-[#ffffff] p-1 focus:outline-none cursor-pointer">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
                </button>
                <div class="flex items-center gap-1">
                    <h1 class="text-lg font-bold tracking-wide text-[#ffffff] m-0 truncate">Calendario Gruppo Lode</h1>
                    <button onclick="location.reload(true)" class="text-[#888888] hover:text-[#ffffff] p-1.5 cursor-pointer transition-colors" title="Aggiorna">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                    </button>
                </div>
            </div>
            <span id="status-badge" class="bg-[#333333] text-[#aaaaaa] text-xs px-2.5 py-1 rounded-full font-medium border border-[#555555]">Caricamento...</span>
        </div>
        <div id="bacheca-container" class="hidden max-w-md mx-auto px-4 pb-4"></div>
    </header>

    <main class="max-w-md mx-auto p-4 pb-12">
        <div id="install-container" class="hidden mb-6 bg-white/[0.03] rounded-xl p-5 shadow-[0_4px_10px_rgba(0,0,0,0.5)] border border-white/[0.05] text-center">
            <h3 class="font-bold text-[#ffffff] mb-2 text-lg">Installa l'App</h3>
            <p class="text-[#aaaaaa] text-sm mb-4 font-light">Accedi più velocemente al calendario direttamente dalla Home.</p>
            <button id="install-btn" class="bg-[#333333] text-[#ffffff] font-bold py-3 px-6 rounded-xl w-full border-none cursor-pointer hover:brightness-110 flex items-center justify-center gap-2">
                📲 Installa Ora
            </button>
            <p id="ios-instruction" class="hidden text-[11px] text-[#888888] mt-3">
                🍎 Hai un iPhone? Tocca <strong>Condividi</strong> e seleziona <strong>"Aggiungi a schermata Home"</strong>.
            </p>
        </div>

        <div>
            <h2 class="text-lg font-black text-white uppercase tracking-widest mb-6 pl-1 drop-shadow-md">Prossimi Appuntamenti</h2>
            <div id="upcoming-events-container" class="space-y-5">
                <!-- Skeleton Loader -->
                <div class="animate-pulse flex flex-col gap-4">
                    <div class="bg-white/[0.03] p-6 rounded-2xl border border-white/[0.05] h-40">
                        <div class="h-6 bg-[#333333] rounded w-1/3 mb-4"></div>
                        <div class="h-8 bg-[#333333] rounded w-1/2 mb-4"></div>
                        <div class="h-4 bg-[#333333] rounded w-1/4"></div>
                    </div>
                    <div class="bg-white/[0.03] p-5 rounded-2xl border border-white/[0.05] h-32">
                        <div class="h-5 bg-[#333333] rounded w-1/3 mb-3"></div>
                        <div class="h-6 bg-[#333333] rounded w-1/2 mb-3"></div>
                        <div class="h-4 bg-[#333333] rounded w-1/4"></div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRJvRESTof_RVpmAyb5vkGX7mAweXbXESyE3BaaX81f4YS3PCo_4c395DvcP7q-iBwr59diu4DLzzCt/pub?gid=1040693821&single=true&output=csv';

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('-translate-x-full');
            document.getElementById('sidebar-overlay').classList.toggle('hidden');
        }

        if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js');

        let deferredPrompt;
        const installContainer = document.getElementById('install-container');
        const installBtn = document.getElementById('install-btn');
        const iosInstruction = document.getElementById('ios-instruction');
        const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
        const isStandalone = window.navigator.standalone || window.matchMedia('(display-mode: standalone)').matches;

        if (isStandalone) {
            // L'app è già installata, nascondi il banner a prescindere dal sistema
            installContainer.classList.add('hidden');
        } else if (isIOS) {
            installContainer.classList.remove('hidden');
            installBtn.classList.add('hidden');
            iosInstruction.classList.remove('hidden');
        } else {
            window.addEventListener('beforeinstallprompt', (e) => {
                e.preventDefault(); deferredPrompt = e; installContainer.classList.remove('hidden');
            });
            installBtn.addEventListener('click', async () => {
                if (deferredPrompt) {
                    deferredPrompt.prompt();
                    const { outcome } = await deferredPrompt.userChoice;
                    if (outcome === 'accepted') installContainer.classList.add('hidden');
                    deferredPrompt = null;
                }
            });
        }

        function formatDate(dateString) {
            if (!dateString || !dateString.includes('-')) return dateString;
            const dateObj = new Date(dateString);
            const days = ['Domenica', 'Lunedì', 'Martedì', 'Mercoledì', 'Giovedì', 'Venerdì', 'Sabato'];
            const dayName = days[dateObj.getDay()];
            const parts = dateString.split('-');
            // Restituisce "Sabato 27" invece di "27 Giu"
            return `${dayName} ${parts[2]}`;
        }

        function getMonthName(dateString) {
            if (!dateString || !dateString.includes('-')) return '';
            const parts = dateString.split('-');
            const months = ['GENNAIO', 'FEBBRAIO', 'MARZO', 'APRILE', 'MAGGIO', 'GIUGNO', 'LUGLIO', 'AGOSTO', 'SETTEMBRE', 'OTTOBRE', 'NOVEMBRE', 'DICEMBRE'];
            return `${months[parseInt(parts[1], 10) - 1]} ${parts[0]}`;
        }

        function getEventColorTheme(eventType) {
            const type = (eventType || '').toLowerCase();
            if (type.includes('internazionale') || type.includes('domenicale')) return 'bg-blue-500/20 text-blue-300 border-blue-500/30';
            if (type.includes('giovani')) return 'bg-rose-500/20 text-rose-300 border-rose-500/30';
            if (type.includes('prove') || type.includes('prova')) return 'bg-emerald-500/20 text-emerald-300 border-emerald-500/30';
            if (type.includes('preghiera')) return 'bg-violet-500/20 text-violet-300 border-violet-500/30';
            if (type.includes('riunione')) return 'bg-amber-500/20 text-amber-300 border-amber-500/30';
            // Default grigio scuro
            return 'bg-[#333333] text-[#ffffff] border-[#666666]';
        }

        // GENERATORE ICS (Risolve i bug del fuso orario e di Google Calendar)
        window.downloadICS = function(titleEnc, dateStr, timeStr) {
            const title = decodeURIComponent(titleEnc);
            if(!dateStr || !dateStr.includes('-')) return;
            const dStr = dateStr.replace(/-/g, '');
            let tStart = "090000";
            let tEnd = "110000"; // Calcola in automatico 2 ore di durata per la lode
            
            if(timeStr && timeStr.includes(':')) {
                const parts = timeStr.split(':');
                tStart = parts[0] + parts[1] + "00";
                let endHour = (parseInt(parts[0], 10) + 2).toString().padStart(2, '0');
                tEnd = endHour + parts[1] + "00";
            }
            
            const icsContent = `BEGIN:VCALENDAR\nVERSION:2.0\nPRODID:-//Sabaoth Lode App//IT\nBEGIN:VEVENT\nSUMMARY:${title}\nDTSTART;TZID=Europe/Rome:${dStr}T${tStart}\nDTEND;TZID=Europe/Rome:${dStr}T${tEnd}\nDESCRIPTION:Promemoria salvato da Sabaoth Lode App\nEND:VEVENT\nEND:VCALENDAR`;

            const blob = new Blob([icsContent], { type: 'text/calendar;charset=utf-8' });
            const url = window.URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.setAttribute('download', 'evento_lode.ics');
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        };

        let allEvents = []; // Variabile globale per la ricerca

        document.getElementById('search-input').addEventListener('input', function(e) {
            const query = e.target.value.toLowerCase();
            processEvents(allEvents, false, query); 
        });

        async function fetchCalendarData() {
            const badge = document.getElementById('status-badge');
            const cachedData = localStorage.getItem('lodeAppData');
            if(cachedData) {
                allEvents = JSON.parse(cachedData);
                processEvents(allEvents);
            }

            try {
                const response = await fetch(SHEET_CSV_URL);
                const csvText = await response.text();
                Papa.parse(csvText, {
                    header: true, skipEmptyLines: true,
                    complete: function(results) { 
                        const newDataStr = JSON.stringify(results.data);
                        // Ridisegniamo la UI solo se i dati dal server sono effettivamente cambiati
                        // Questo previene il flash e la doppia animazione quando si apre l'app
                        if (newDataStr !== cachedData) {
                            localStorage.setItem('lodeAppData', newDataStr);
                            allEvents = results.data;
                            processEvents(allEvents); 
                        }
                        badge.innerText = "Aggiornato";
                        badge.className = "bg-white/[0.03] text-[#aaaaaa] text-xs px-2.5 py-1 rounded-full font-light border border-white/[0.05]";
                    }
                });
            } catch (error) {
                if(!cachedData) badge.innerText = "Sei Offline";
            }
        }

        function processEvents(events, updateBacheca = true, query = '') {
            const upcomingContainer = document.getElementById('upcoming-events-container');
            const pastContainer = document.getElementById('past-events-container');
            const bachecaContainer = document.getElementById('bacheca-container');
            
            const today = new Date();
            today.setHours(0,0,0,0);
            let upcoming = [];
            let past = [];

            // GESTIONE BACHECA
            if (updateBacheca) {
                const rowWithBacheca = events.find(e => e.Bacheca && e.Bacheca.trim() !== '');
                if (rowWithBacheca) {
                    bachecaContainer.innerHTML = `
                        <div class="bg-gradient-to-r from-[#2a2a2a] to-[#1f1f1f] border-l-4 border-[#ffaa00] p-4 rounded-xl shadow-[0_4px_10px_rgba(0,0,0,0.5)] flex items-start gap-3 animate-fade-in-up">
                            <span class="text-xl">📢</span>
                            <div class="text-[#e0e0e0] text-sm font-medium leading-snug mt-0.5">${rowWithBacheca.Bacheca.trim()}</div>
                        </div>`;
                    bachecaContainer.classList.remove('hidden');
                } else {
                    bachecaContainer.classList.add('hidden');
                }
            }

            events.forEach(event => {
                if (!event.Data || !event['Tipo Evento']) return;
                const evDate = new Date(event.Data);
                if (evDate >= today) {
                    upcoming.push(event);
                } else {
                    if (query) {
                        const textToSearch = (event['Titolo Calendario'] || '') + ' ' + 
                                             (event['Tipo Evento'] || '') + ' ' + 
                                             (event['Scaletta Canzoni'] || '') + ' ' + 
                                             (event.Data || '');
                        if (textToSearch.toLowerCase().includes(query)) {
                            past.push(event);
                        }
                    } else {
                        past.push(event);
                    }
                }
            });

            upcoming.sort((a, b) => new Date(a.Data) - new Date(b.Data));
            past.sort((a, b) => new Date(b.Data) - new Date(a.Data));

            renderUpcoming(upcoming, upcomingContainer);
            renderPast(past, pastContainer);
        }

        function renderUpcoming(events, container) {
            if(events.length === 0) {
                container.innerHTML = `<p class="text-center text-[#888888] font-light py-8">Nessun evento in programma.</p>`;
                return;
            }

            let htmlContent = '';
            let currentMonth = '';

            events.forEach((event, index) => {
                const monthStr = getMonthName(event.Data);
                const isHero = index === 0;

                // Creazione del Divisore Mensile
                if (monthStr !== currentMonth) {
                    htmlContent += `
                    <div class="${index === 0 ? 'mb-6' : 'mt-12 mb-6'} flex items-center gap-3">
                        <div class="bg-[#333333] p-2 rounded-lg border border-[#555555] shadow-md">
                            <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                        </div>
                        <h3 class="text-white text-xl font-black tracking-widest uppercase drop-shadow-md">${monthStr}</h3>
                        <div class="flex-1 h-px bg-gradient-to-r from-white/[0.1] to-transparent ml-2"></div>
                    </div>`;
                    currentMonth = monthStr;
                }

                let formationBlock = '';
                if (event.Formazione) {
                    const members = event.Formazione.split(',').map(m => m.trim()).filter(m => m !== '');
                    const chips = members.map(m => `<span class="bg-white/[0.05] text-[#cccccc] text-xs font-medium px-2.5 py-1 rounded-md border border-white/[0.05] shadow-sm">${m}</span>`).join('');
                    formationBlock = `<div class="border-t border-b border-[#333333] py-3 mt-4"><p class="text-[11px] text-[#888888] uppercase font-bold tracking-wider mb-2">Formazione</p><div class="flex flex-wrap gap-2">${chips}</div></div>`;
                }
                
                let songsBlock = '';
                if (event['Scaletta Canzoni']) {
                    const separator = event['Scaletta Canzoni'].includes('|') ? '|' : ',';
                    const songs = event['Scaletta Canzoni'].split(separator).filter(s => s.trim() !== '');
                    
                    songsBlock = `<div class="mt-4"><p class="text-[11px] text-[#888888] uppercase font-bold tracking-wider mb-2">Scaletta</p><ul class="space-y-2 text-sm">${songs.map((s, i) => {
                        const songClean = s.trim();
                        const ytLink = `https://www.youtube.com/results?search_query=${encodeURIComponent(songClean)}`;
                        return `
                        <li class="bg-white/[0.03] px-3 py-2.5 rounded-xl border border-white/[0.05] flex justify-between items-center gap-2">
                            <div class="flex gap-2 items-center">
                                <span class="text-[#aaaaaa] font-bold">${i + 1}.</span> 
                                <span class="text-[#ffffff]">${songClean}</span>
                            </div>
                            <a href="${ytLink}" target="_blank" class="text-[#ff4444] bg-[#ff4444]/10 p-2 rounded-lg border border-[#ff4444]/20 hover:bg-[#ff4444]/20 transition-colors flex items-center justify-center shrink-0">
                                <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.5 12 3.5 12 3.5s-7.505 0-9.377.55a3.016 3.016 0 0 0-2.122 2.136C.005 8.08.005 12 .005 12s0 3.92.496 5.814a3.016 3.016 0 0 0 2.122 2.136c1.872.55 9.377.55 9.377.55s7.505 0 9.377-.55a3.016 3.016 0 0 0 2.122-2.136C24 15.92 24 12 24 12s0-3.92-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>
                            </a>
                        </li>`;
                    }).join('')}</ul></div>`;
                }

                let notesBlock = event['Note e Prove'] ? `<div class="bg-white/[0.03] border border-white/[0.05] rounded-xl p-3 text-[13px] text-[#aaaaaa] mt-4 font-light tracking-wide">📌 ${event['Note e Prove']}</div>` : '';

                let calendarTitle = event['Titolo Calendario'] || event['Tipo Evento'] || 'Evento Lode';
                
                let calendarBtn = `
                    <button onclick="downloadICS('${encodeURIComponent(calendarTitle)}', '${event.Data}', '${event.Orario}')" class="mt-4 flex items-center justify-center gap-2 w-full bg-white/[0.05] hover:bg-white/[0.1] text-[#aaaaaa] text-xs py-2.5 rounded-lg border border-white/[0.05] transition-colors cursor-pointer">
                        📅 Salva nel Calendario
                    </button>`;

                // LOGICA DESIGN HERO E NUOVO TITOLO GRANDE
                const cardStyle = isHero 
                    ? "bg-gradient-to-br from-[#222222] to-[#151515] p-6 shadow-[0_4px_20px_rgba(255,255,255,0.04)] border border-[#444444] relative overflow-hidden" 
                    : "bg-white/[0.03] p-5 shadow-[0_4px_10px_rgba(0,0,0,0.5)] border border-white/[0.05]";
                
                // CALCOLO BADGE TEMPORALE (OGGI / DOMANI / TRA X GIORNI)
                let dateBadge = ''; // Per il badge assoluto in alto a destra (solo Hero)
                let inlineBadge = ''; // Per il badge sopra l'orario (altre card)
                const evDate = new Date(event.Data);
                evDate.setHours(0,0,0,0);
                const todayBadge = new Date();
                todayBadge.setHours(0,0,0,0);
                const diffTime = evDate - todayBadge;
                const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
                
                if (isHero) {
                    if (diffDays === 0) dateBadge = `<div class="absolute top-0 right-0 bg-[#e53e3e] text-[#ffffff] text-[10px] font-bold px-3 py-1.5 rounded-bl-xl uppercase tracking-widest shadow-md flex items-center gap-1"><span class="animate-pulse">🔥</span> OGGI</div>`;
                    else if (diffDays === 1) dateBadge = `<div class="absolute top-0 right-0 bg-[#ecc94b] text-[#000000] text-[10px] font-bold px-3 py-1.5 rounded-bl-xl uppercase tracking-widest shadow-md flex items-center gap-1">⏳ DOMANI</div>`;
                    else dateBadge = `<div class="absolute top-0 right-0 bg-[#ffffff] text-[#000000] text-[9px] font-bold px-3 py-1.5 rounded-bl-xl uppercase tracking-widest shadow-md">TRA ${diffDays} GIORNI</div>`;
                }
                // Rimosso il badge temporale dalle altre card per mantenere pulizia visiva
                
                const dateSize = isHero ? "text-[32px]" : "text-[22px]";
                
                // TITOLO SQUADRATO, GRANDE E BEN VISIBILE CON COLORI DINAMICI
                const titleClass = isHero ? "text-[14px] px-3.5 py-1.5" : "text-[12px] px-3 py-1";
                const themeClass = getEventColorTheme(calendarTitle);

                const staggerClass = index < 3 ? `stagger-${index + 1}` : '';
                htmlContent += `<div class="rounded-2xl ${cardStyle} mb-4 animate-fade-in-up ${staggerClass}">
                    ${dateBadge}
                    <div class="flex justify-between items-start gap-4">
                        <div class="flex-1">
                            <span class="${themeClass} ${titleClass} font-bold rounded-lg uppercase tracking-widest shadow-md inline-block mb-2 border">${calendarTitle}</span>
                            <h2 class="${dateSize} font-bold mt-1 text-[#ffffff] m-0 leading-tight">${formatDate(event.Data)}</h2>
                        </div>
                        <div class="flex flex-col items-end gap-1.5 shrink-0 mt-1">
                            ${inlineBadge}
                            <span class="bg-[#333333] px-2.5 py-1.5 rounded-lg text-sm font-bold text-[#ffffff] block border border-[#555555] shadow-sm">${event.Orario || '--:--'}</span>
                        </div>
                    </div>
                    ${formationBlock}${songsBlock}${notesBlock}${calendarBtn}
                </div>`;
            });
            container.innerHTML = htmlContent;
        }

        function renderPast(events, container) {
            let htmlContent = '';
            events.forEach((event, index) => {
                let calendarTitle = event['Titolo Calendario'] || event['Tipo Evento'] || 'Evento';
                const pastIndex = events.indexOf(event);
                const staggerClass = pastIndex < 3 ? `stagger-${pastIndex + 1}` : '';
                
                let songsBlock = '';
                let hasSongs = false;
                if (event['Scaletta Canzoni']) {
                    const separator = event['Scaletta Canzoni'].includes('|') ? '|' : ',';
                    const songs = event['Scaletta Canzoni'].split(separator).filter(s => s.trim() !== '');
                    if (songs.length > 0) {
                        hasSongs = true;
                        songsBlock = `<div id="past-songs-${index}" class="hidden mt-3 pt-3 border-t border-white/[0.05]"><p class="text-[10px] text-[#888888] uppercase font-bold tracking-wider mb-2">Scaletta</p><ul class="space-y-1.5 text-xs text-[#cccccc]">${songs.map((s, i) => {
                            const songClean = s.trim();
                            const ytLink = `https://www.youtube.com/results?search_query=${encodeURIComponent(songClean)}`;
                            return `<li class="flex justify-between items-center bg-white/[0.02] px-2 py-1.5 rounded-lg border border-white/[0.02]">
                                <span><span class="text-[#888888]">${i + 1}.</span> ${songClean}</span>
                                <a href="${ytLink}" target="_blank" class="text-[#ff4444] p-1.5 rounded hover:bg-[#ff4444]/20 transition-colors" title="Cerca su YouTube">
                                    <svg class="w-3 h-3" fill="currentColor" viewBox="0 0 24 24"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.5 12 3.5 12 3.5s-7.505 0-9.377.55a3.016 3.016 0 0 0-2.122 2.136C.005 8.08.005 12 .005 12s0 3.92.496 5.814a3.016 3.016 0 0 0 2.122 2.136c1.872.55 9.377.55 9.377.55s7.505 0 9.377-.55a3.016 3.016 0 0 0 2.122-2.136C24 15.92 24 12 24 12s0-3.92-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>
                                </a>
                            </li>`;
                        }).join('')}</ul></div>`;
                    }
                }

                const caretIcon = hasSongs ? `
                    <button class="text-[#888888] focus:outline-none p-1 transition-transform duration-300" id="past-caret-${index}">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                    </button>
                ` : '';

                // rimosso grayscale-[50%] per miglior leggibilità
                htmlContent += `
                <div class="bg-white/[0.02] rounded-xl p-4 border border-white/[0.05] opacity-80 mb-3 animate-fade-in-up ${staggerClass} ${hasSongs ? 'cursor-pointer hover:bg-white/[0.04] transition-colors' : ''}" ${hasSongs ? `onclick="togglePastEvent(${index})"` : ''}>
                    <div class="flex justify-between items-center">
                        <div>
                            <span class="text-[#aaaaaa] text-[11px] font-bold uppercase tracking-wider">${calendarTitle}</span>
                            <h2 class="text-lg font-bold text-[#e0e0e0] m-0 mt-1">${formatDate(event.Data)}</h2>
                        </div>
                        <div class="flex flex-col items-end gap-1">
                            <span class="text-xs font-bold text-[#888888] bg-[#222222] px-2 py-1 rounded-md border border-[#333333]">${event.Orario || '--:--'}</span>
                            ${caretIcon}
                        </div>
                    </div>
                    ${songsBlock}
                </div>`;
            });
            container.innerHTML = htmlContent || `<p class="text-center text-[#888888] font-light py-4 text-sm">Nessun evento passato.</p>`;
        }

        function togglePastEvent(id) {
            const songsDiv = document.getElementById(`past-songs-${id}`);
            const caret = document.getElementById(`past-caret-${id}`);
            if(songsDiv && caret) {
                if(songsDiv.classList.contains('hidden')) {
                    songsDiv.classList.remove('hidden');
                    caret.classList.add('rotate-180');
                } else {
                    songsDiv.classList.add('hidden');
                    caret.classList.remove('rotate-180');
                }
            }
        }

        fetchCalendarData();
    </script>
</body>
</html>
