<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Calendario Gruppo Lode</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#111111">
    <link rel="apple-touch-icon" href="./icon.png">
    
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
</head>
<body class="bg-[#111111] text-[#ffffff] min-h-screen font-sans antialiased tracking-wide">

    <header class="bg-[#111111] border-b border-white/[0.05] sticky top-0 z-10 shadow-[0_4px_10px_rgba(0,0,0,0.5)]">
        <div class="max-w-md mx-auto px-4 py-4 flex justify-between items-center">
            <h1 class="text-xl font-bold tracking-wide text-[#ffffff]">🎵 Calendario Gruppo Lode</h1>
            <span id="status-badge" class="bg-[#333333] text-[#aaaaaa] text-xs px-2.5 py-1 rounded-full font-medium border border-[#555555]">Caricamento...</span>
        </div>
    </header>

    <main class="max-w-md mx-auto p-4 pb-12">
        
        <div id="install-container" class="hidden mb-6 bg-white/[0.03] rounded-xl p-5 shadow-[0_4px_10px_rgba(0,0,0,0.5)] border border-white/[0.05] text-center">
            <h3 class="font-bold text-[#ffffff] mb-2 text-lg">Installa l'App sul telefono</h3>
            <p class="text-[#aaaaaa] text-sm mb-4 font-light">Accedi più velocemente al calendario direttamente dalla Home del tuo telefono.</p>
            <button id="install-btn" class="bg-[#333333] text-[#ffffff] font-bold py-3 px-6 rounded-xl w-full border-none cursor-pointer transition-all duration-300 hover:-translate-y-0.5 hover:brightness-110 flex items-center justify-center gap-2">
                📲 Installa Ora
            </button>
            <p id="ios-instruction" class="hidden text-[11px] text-[#888888] mt-3">
                🍎 Hai un iPhone? Tocca l'icona <strong>Condividi</strong> in basso e seleziona <strong>"Aggiungi a schermata Home"</strong>.
            </p>
        </div>

        <div id="events-container" class="space-y-5"></div>
    </main>

    <script>
        // 1. INCOLLA IL TUO LINK CSV QUI
        const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRJvRESTof_RVpmAyb5vkGX7mAweXbXESyE3BaaX81f4YS3PCo_4c395DvcP7q-iBwr59diu4DLzzCt/pub?gid=1040693821&single=true&output=csv';

        // REGISTRAZIONE SERVICE WORKER (Necessario per l'installazione)
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js').then(() => { console.log("Service Worker Registrato"); });
        }

        // LOGICA DEL BOTTONE DI INSTALLAZIONE
        let deferredPrompt;
        const installContainer = document.getElementById('install-container');
        const installBtn = document.getElementById('install-btn');
        const iosInstruction = document.getElementById('ios-instruction');

        // Controlla se è iOS
        const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;

        if (isIOS) {
            // Su iOS non possiamo forzare l'installazione con un bottone, mostriamo le istruzioni
            installContainer.classList.remove('hidden');
            installBtn.classList.add('hidden');
            iosInstruction.classList.remove('hidden');
        } else {
            // Logica per Android / Chrome
            window.addEventListener('beforeinstallprompt', (e) => {
                e.preventDefault();
                deferredPrompt = e;
                installContainer.classList.remove('hidden'); // Mostra il bottone se il telefono permette l'installazione
            });

            installBtn.addEventListener('click', async () => {
                if (deferredPrompt) {
                    deferredPrompt.prompt();
                    const { outcome } = await deferredPrompt.userChoice;
                    if (outcome === 'accepted') {
                        installContainer.classList.add('hidden');
                    }
                    deferredPrompt = null;
                }
            });
        }

        // LOGICA FOGLIO GOOGLE (Aggiornata per la palette)
        function getBadgeStyle(type) {
            // Badge uniforme coerente con lo stile scuro
            return 'bg-[#333333] text-[#ffffff] border-[#555555]';
        }

        function formatDate(dateString) {
            if (!dateString || !dateString.includes('-')) return dateString;
            const parts = dateString.split('-');
            if (parts.length !== 3) return dateString;
            const months = ['Gen', 'Feb', 'Mar', 'Apr', 'Mag', 'Giu', 'Lug', 'Ago', 'Set', 'Ott', 'Nov', 'Dic'];
            return `${parts[2]} ${months[parseInt(parts[1], 10) - 1]}`;
        }

        async function fetchCalendarData() {
            try {
                const response = await fetch(SHEET_CSV_URL);
                const csvText = await response.text();
                Papa.parse(csvText, {
                    header: true, skipEmptyLines: true,
                    complete: function(results) { 
                        renderEvents(results.data); 
                        const badge = document.getElementById('status-badge');
                        badge.innerText = "Aggiornato";
                        badge.className = "bg-white/[0.03] text-[#aaaaaa] text-xs px-2.5 py-1 rounded-full font-light border border-white/[0.05]";
                    }
                });
            } catch (error) {
                const badge = document.getElementById('status-badge');
                badge.innerText = "Errore di connessione";
                badge.className = "bg-[#333333] text-[#aaaaaa] text-xs px-2.5 py-1 rounded-full font-light border border-[#555555]";
            }
        }

        function renderEvents(events) {
            const container = document.getElementById('events-container');
            let htmlContent = '';
            events.forEach(event => {
                if (!event.Data || !event['Tipo Evento']) return;

                let formationBlock = event.Formazione ? `<div class="border-t border-b border-[#333333] py-3"><p class="text-[11px] text-[#888888] uppercase font-bold tracking-wider mb-1">Formazione</p><p class="text-sm text-[#aaaaaa] font-light">${event.Formazione}</p></div>` : '';
                
                let songsBlock = '';
                if (event['Scaletta Canzoni']) {
                    const separator = event['Scaletta Canzoni'].includes('|') ? '|' : ',';
                    const songs = event['Scaletta Canzoni'].split(separator).filter(s => s.trim() !== '');
                    songsBlock = `<div><p class="text-[11px] text-[#888888] uppercase font-bold tracking-wider mb-2">Scaletta</p><ul class="space-y-2 text-sm">${songs.map((s, i) => `<li class="bg-white/[0.03] px-3 py-2.5 rounded-xl border border-white/[0.05] flex gap-2"><span class="text-[#aaaaaa] font-bold">${i + 1}.</span> <span class="text-[#ffffff]">${s.trim()}</span></li>`).join('')}</ul></div>`;
                }

                let notesBlock = event['Note e Prove'] ? `<div class="bg-white/[0.03] border border-white/[0.05] rounded-xl p-3 text-[13px] text-[#aaaaaa] mt-3 font-light tracking-wide">📌 ${event['Note e Prove']}</div>` : '';

                htmlContent += `<div class="bg-white/[0.03] rounded-2xl p-5 shadow-[0_4px_10px_rgba(0,0,0,0.5)] border border-white/[0.05] space-y-4">
                    <div class="flex justify-between items-start gap-4">
                        <div>
                            <span class="border text-[10px] font-bold px-2.5 py-0.5 rounded-full uppercase tracking-wider ${getBadgeStyle(event['Tipo Evento'])}">${event['Tipo Evento']}</span>
                            <h2 class="text-[22px] font-bold mt-2.5 text-[#ffffff] m-0 leading-tight">${formatDate(event.Data)}</h2>
                        </div>
                        <div class="text-right shrink-0"><span class="bg-[#333333] px-2.5 py-1.5 rounded-lg text-sm font-bold text-[#ffffff] block border border-[#555555] shadow-sm">${event.Orario || '--:--'}</span></div>
                    </div>
                    ${formationBlock}${songsBlock}${notesBlock}
                </div>`;
            });
            container.innerHTML = htmlContent || `<p class="text-center text-[#888888] font-light">Nessun evento in programma.</p>`;
        }

        fetchCalendarData();
    </script>
</body>
</html>
